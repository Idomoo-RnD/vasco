name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux_amd64
          - os: ubuntu-24.04-arm
            target: linux_arm64
          - os: macos-15-intel
            target: darwin_amd64
          - os: macos-14
            target: darwin_arm64
          - os: windows-latest
            target: windows_amd64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: node scripts/build-sea.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: strata_${{ matrix.target }}
          path: dist/strata_*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum strata_* > checksums.txt && cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
