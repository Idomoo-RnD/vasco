name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm test
      - name: CLI smoke (compile example via bin)
        run: node bin/idm.mjs compile examples/demo.json -o /tmp/demo.idm --json || node bin/idm.mjs compile examples/demo.json -o demo_ci.idm --json
